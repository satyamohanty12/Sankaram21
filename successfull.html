<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Successfully login :</h1>

    <button id="listBtn">List Users</button>

    <div id="users">
        <table border="1" width="50%" align="center">

            <thead>

                <tr>

                    <th>Username</th>
                    <th>Email</th>

                </tr>

            </thead>

            <tbody id="usersTable">

            </tbody>

        </table>
    </div>
    <style>
        body{
            background:linear-gradient(135deg , rgb(247, 182, 212) , rgb(252, 255, 159));
        }
        button{
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 45%;
            border-radius: 1rem;
        }
        button:hover{
            background-color: orangered;
        }

        #users{
            margin-top: 30px;
            text-align: center;
            font-size: 20px;
        }
    </style>
</body>
<script>
    const btn = document.getElementById("listBtn");

    btn.addEventListener("click", async () => {

        try {

            const response = await fetch(
                "https://9d8r6nlzi1.execute-api.ap-south-1.amazonaws.com/dev/userlist"
            );

            const users = await response.json();

            const usersTable = document.getElementById("usersTable");

            usersTable.innerHTML = "";

            users.forEach((user) => {

                usersTable.innerHTML += `

                    <tr>

                        <td>${user.username}</td>

                        <td>${user.email}</td>

                    </tr>

                `;

            });

        }

        catch(error){

            console.log(error);

            alert("Something went wrong");

        }

    });
</script>
</html>
